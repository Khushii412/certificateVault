<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View+Download-page</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>
<body class="bg-light" style="font-family: 'Poppins', sans-serif;">
   <div class = "container mt-4">
        <h3 class="mb-3">File Preview</h3>
        <div class="card mb-2 shadow-2 p-2">

            <iframe src="/uploadedFile/{{ filename }}" width="100%" height="500px"></iframe>
            <a href="/download/{{filename}}" class="btn btn-success">Download</a>
            <a href="/dashboard" class="btn btn-secondary mt-2">Back to dashboard</a>
        </div>
   </div>
</br>

</body>
</html>
