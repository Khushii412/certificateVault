<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>register-page</title>
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
     <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="font-family: 'Poppins', sans-serif;">
    <div class="container mt-4">
        <div class= "row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-lg border-1 rounded-4">
                    <div class="card-body p-3">
                        <h3 class="text-center mb-4">Create Account</h3>
                        <form method= "POST">
                            <div class="form-group mb-3">
                                <label class="form-label ">Name:</label>
                                <input type="text" name="name" required class="form-control">
                            </div>
                            <div class="form-group mb-3">
                                <label class="form-label">Email:</label>
                                <input type="email" name="email" required class="form-control">
                            </div>
                            <div class="form-group mb-3">
                                <label class="form-label">Password:</label>
                                <input type="password" name="password" required class="form-control">
                            </div>

                            <button type="submit" class="btn btn-primary w-100 mt-3 mb-2">Register</button>
                        
                        </form>
                        <p class= "text-center">Already have an account?
                        <a href="/login"> Login here.</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
