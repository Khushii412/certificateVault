<html>
    <head>
        <title>edit_certificate page</title>
         <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light ">
         <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="/<dashboard">CertificateVault</a>
                <div class="d-flex">
                    <a href="/dashboard" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
                    <a href="/certificates" class="btn btn-outline-light btn-sm me-2">My Certificates</a>
                    <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
                </div>
            </div>
        </nav>
        <div class="container mt-4">
            
                <h2 class="text-center mb-4">Edit Certificate</h2>
                <form method="POST" action='/update/{{cert[0]}}' class="card p-4 shadow-sm">
                    <p>ID: {{ cert }}</p>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Title</label>
                        <input type="text" name="title" class="form-control" value="{{cert[2]}}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Issuer</label>
                        <input type="text" name="issuer" class="form-control" value="{{cert[3]}}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Issue date</label>
                        <input type="date" name ="issue_date" class="form-control" value="{{cert[4]}}"></input>
                    </div>
                    <button type="submit" class="btn btn-primary mb-3">Update</button>
                    <a href="/certificates" class="btn btn-secondary ">Cancel</a>
                </form>
            
        </div>

    </body>
